<!-- Email Entry Form -->
<div *ngIf="!emailSent" class="forgot-container">
  <div class="form-heading">
    <fa-icon icon="envelope" size="lg"></fa-icon>
    <span>Forgot Password</span>
  </div>
  <p class="form-subheading">Enter your email address and we'll send you a reset link.</p>

  <form class="forgot-form" [formGroup]="forgotPasswordForm" (ngSubmit)="submitRequest()">
    <mat-form-field class="form-field" appearance="outline">
      <mat-label>Email Address</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="email" />
      <span matPrefix class="field-icon">
        <fa-icon icon="envelope"></fa-icon>
      </span>
      <mat-error *ngIf="forgotPasswordForm.controls.email.hasError('required')">
        Email is <strong>required</strong>
      </mat-error>
      <mat-error *ngIf="forgotPasswordForm.controls.email.hasError('email')">
        Please enter a <strong>valid email</strong>
      </mat-error>
    </mat-form-field>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button
      mat-raised-button
      class="submit-button"
      [disabled]="!forgotPasswordForm.valid || loading"
      type="submit"
    >
      Send Reset Link
      <mat-spinner [diameter]="20" *ngIf="loading"></mat-spinner>
    </button>
  </form>

  <a class="back-link" (click)="backToLogin.emit()">
    <fa-icon icon="arrow-left"></fa-icon>
    Back to Login
  </a>
</div>

<!-- Success State -->
<div *ngIf="emailSent" class="success-container">
  <div class="success-icon">
    <fa-icon icon="check-circle" size="3x"></fa-icon>
  </div>
  <p class="success-heading">Check your email</p>
  <p class="success-text">
    We've sent a password reset link to<br />
    <strong>{{ forgotPasswordForm.value.email }}</strong>
  </p>
  <a class="back-link" (click)="backToLogin.emit()">
    <fa-icon icon="arrow-left"></fa-icon>
    Back to Login
  </a>
</div>
