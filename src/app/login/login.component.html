<!-- Login Page with Blue Gradient Background -->
<div class="login-page">
  <!-- Header Bar with Controls -->
  <div class="header-bar">
    <img src="assets/images/IDM Neo logo.png" width="48px" height="48px" alt="{{ 'APP_NAME' | translate }} Logo" class="header-logo" />
    <div class="header-controls">
      <mifosx-language-selector></mifosx-language-selector>
      <mifosx-theme-toggle></mifosx-theme-toggle>
      <mifosx-server-selector *ngIf="allowServerSwitch()"></mifosx-server-selector>
    </div>
  </div>

  <!-- Main Content -->
  <div class="login-content">
    <!-- Welcome Header -->
    <h1 class="welcome-title">Welcome to {{ getTenantName() }}</h1>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Lock Icon -->
      <div class="lock-icon">
        <fa-icon icon="lock" size="2x"></fa-icon>
      </div>

      <!-- Login Form Title -->
      <h2 class="form-title">Log in to your account</h2>

      <!-- Tenant Selector (if enabled) -->
      <mifosx-tenant-selector *ngIf="displayTenantSelector()"></mifosx-tenant-selector>

      <!-- Form Section -->
      <mifosx-login-form *ngIf="!resetPassword && !twoFactorAuthenticationRequired"></mifosx-login-form>
      <mifosx-reset-password *ngIf="resetPassword"></mifosx-reset-password>
      <mifosx-two-factor-authentication *ngIf="twoFactorAuthenticationRequired"></mifosx-two-factor-authentication>
    </div>
  </div>

  <!-- Footer -->
  <div class="login-footer">
    <mifosx-footer></mifosx-footer>
  </div>
</div>
