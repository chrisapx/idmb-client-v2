<div class="s-page">
  <div class="s-head">
    <h1>Hooks</h1>
    <div class="s-head-actions">
      <button mat-flat-button class="s-primary-btn" [routerLink]="['create']" *mifosxHasPermission="'CREATE_HOOK'">
        <mat-icon>add</mat-icon> Add Hook
      </button>
    </div>
  </div>

  <div class="s-filters">
    <div class="s-filter-left">
      <div class="s-chip-wrap">
        <button class="s-filter-chip" [class.applied]="filterValue" (click)="activeChip = activeChip === 'filter' ? null : 'filter'">
          <mat-icon>{{ filterValue ? 'check' : 'add' }}</mat-icon>
          Filter{{ filterValue ? ': ' + filterValue : '' }}
          <mat-icon class="chip-x" *ngIf="filterValue" (click)="$event.stopPropagation(); filterValue = ''; applyFilter('')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeChip === 'filter'">
          <div class="s-pop-title">Filter</div>
          <div class="s-pop-row">
            <span class="s-pop-label">contains</span>
            <input class="s-pop-input" [(ngModel)]="filterValue" placeholder="Type to filter..." (keydown.enter)="activeChip = null; applyFilter(filterValue)" />
          </div>
          <button class="s-pop-apply" (click)="activeChip = null; applyFilter(filterValue)">Apply</button>
        </div>
      </div>
    </div>
    <div class="s-filter-right">
      <button class="s-action-chip" *ngIf="filterValue" (click)="filterValue = ''; applyFilter('')"><mat-icon>close</mat-icon> Clear</button>
    </div>
  </div>

  <div class="s-table">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Hook Template' | translate }}</th>
        <td mat-cell *matCellDef="let hook">{{ hook.name | translateKey: 'text' }}</td>
      </ng-container>

      <ng-container matColumnDef="displayName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Hook Name' | translate }}</th>
        <td mat-cell *matCellDef="let hook">{{ hook.displayName }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Status' | translate }}</th>
        <td mat-cell *matCellDef="let hook">
          <span class="s-pill-sm" [class.active]="hook.isActive" [class.inactive]="!hook.isActive">
            {{ hook.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id]" class="s-row"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
