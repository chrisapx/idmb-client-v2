<!-- Stripe top bar -->
<div class="s-topbar" id="mifosx-toolbar">
  <div class="s-search-wrap">
    <mifosx-search-tool></mifosx-search-tool>
  </div>

  <span class="s-spacer"></span>

  <div class="s-icon-group">
    <button mat-icon-button class="s-btn" [routerLink]="['/home']" matTooltip="Dashboard"><mat-icon>grid_view</mat-icon></button>
    <button mat-icon-button class="s-btn" (click)="toggleHelp()" matTooltip="Help"><mat-icon>help_outline</mat-icon></button>
    <button mat-icon-button class="s-btn s-plus" [matMenuTriggerFor]="createMenu" matTooltip="Create new"><mat-icon>add_circle</mat-icon></button>
  </div>

  <a class="s-guide" (click)="toggleHelp()">
    <span>Help center</span>
    <svg width="20" height="20" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="8" stroke="#E3E8EE" stroke-width="2.5" fill="none"/>
      <circle cx="10" cy="10" r="8" stroke="#635BFF" stroke-width="2.5" fill="none"
              stroke-dasharray="50.26" stroke-dashoffset="25" stroke-linecap="round"
              transform="rotate(-90 10 10)"/>
    </svg>
  </a>
</div>

<!-- Create menu -->
<mat-menu #createMenu="matMenu" class="s-create-menu">
  <button mat-menu-item routerLink="/clients/create"><mat-icon>person_add</mat-icon>New Client</button>
  <button mat-menu-item routerLink="/groups/create"><mat-icon>group_add</mat-icon>New Group</button>
  <button mat-menu-item routerLink="/centers/create"><mat-icon>add_business</mat-icon>New Center</button>
  <button mat-menu-item routerLink="/accounting/journal-entries/create"><mat-icon>post_add</mat-icon>Journal Entry</button>
  <button mat-menu-item routerLink="/products/loan-products/create"><mat-icon>add_card</mat-icon>Loan Product</button>
  <button mat-menu-item routerLink="/products/saving-products/create"><mat-icon>add_box</mat-icon>Saving Product</button>
</mat-menu>

<!-- Help widget panel -->
<div class="s-help-panel" *ngIf="showHelpWidget" (click)="$event.stopPropagation()">
  <div class="s-help-header">
    <span>Help & Support</span>
    <button mat-icon-button class="s-btn" (click)="toggleHelp()"><mat-icon>close</mat-icon></button>
  </div>
  <div class="s-help-body">
    <div class="s-help-search">
      <mat-icon>search</mat-icon>
      <input placeholder="Search help articles..." />
    </div>
    <div class="s-help-section">
      <div class="s-help-item" [routerLink]="['/help']" (click)="toggleHelp()">
        <mat-icon>menu_book</mat-icon>
        <div><strong>Getting Started</strong><br><span>Learn the basics of managing your institution</span></div>
      </div>
      <div class="s-help-item" (click)="openDocs()">
        <mat-icon>description</mat-icon>
        <div><strong>Documentation</strong><br><span>Read the full user manual</span></div>
      </div>
      <div class="s-help-item">
        <mat-icon>chat_bubble_outline</mat-icon>
        <div><strong>Chat with us</strong><br><span>Get instant help from our support team</span></div>
      </div>
      <div class="s-help-item">
        <mat-icon>email</mat-icon>
        <div><strong>Email support</strong><br><span>support&#64;idmfh.com</span></div>
      </div>
    </div>
  </div>
</div>
<div class="s-help-backdrop" *ngIf="showHelpWidget" (click)="toggleHelp()"></div>
