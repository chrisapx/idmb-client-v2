<mat-sidenav-container id="mifosx-shell-container">
  <mat-sidenav
    #sidenav
    class="sidebar-panel"
    [ngClass]="{ 'sidebar-full': !sidenavCollapsed, 'sidebar-compact': sidenavCollapsed }"
    role="navigation"
    mode="side"
    [opened]="true"
    [disableClose]="true"
  >
    <mifosx-sidenav [sidenavCollapsed]="sidenavCollapsed"></mifosx-sidenav>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <!-- Collapse/expand hover trigger on left edge -->
    <div class="collapse-edge" (click)="toggleCollapse(!sidenavCollapsed)">
      <div class="collapse-pill">
        <mat-icon>{{ sidenavCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        <span>{{ sidenavCollapsed ? 'Expand' : 'Collapse' }}</span>
      </div>
    </div>

    <div class="fixed-header">
      <mifosx-toolbar [sidenav]="sidenav"></mifosx-toolbar>
    </div>


    <div class="page-wrapper">
      <mifosx-content></mifosx-content>
    </div>

    <div class="fixed-footer">
      <mifosx-footer [styleClass]="'main-page'"></mifosx-footer>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
