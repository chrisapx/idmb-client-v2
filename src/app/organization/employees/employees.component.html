<div class="s-page">
  <div class="s-head">
    <h1>Employees</h1>
    <div class="s-head-actions">
      <button mat-stroked-button class="s-outline-btn" [routerLink]="['/', 'organization', 'bulk-import', 'Employees']" *mifosxHasPermission="'CREATE_STAFF'" #buttonImportEmployees>
        <mat-icon>upload</mat-icon> Import
      </button>
      <button mat-flat-button class="s-primary-btn" [routerLink]="['create']" *mifosxHasPermission="'CREATE_STAFF'" #buttonCreateEmployee>
        <mat-icon>add</mat-icon> Add employee
      </button>
    </div>
  </div>

  <!-- Filter chips row -->
  <div class="s-filters" #filter>
    <div class="s-filter-left">
      <div class="s-chip-wrap">
        <button class="s-filter-chip" [class.applied]="filterValue" (click)="activeChip = activeChip === 'filter' ? null : 'filter'">
          <mat-icon>{{ filterValue ? 'check' : 'add' }}</mat-icon>
          Filter{{ filterValue ? ': ' + filterValue : '' }}
          <mat-icon class="chip-x" *ngIf="filterValue" (click)="$event.stopPropagation(); filterValue = ''; applyFilter('')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeChip === 'filter'">
          <div class="s-pop-title">Filter</div>
          <div class="s-pop-row">
            <span class="s-pop-label">contains</span>
            <input class="s-pop-input" [(ngModel)]="filterValue" placeholder="Type to filter..." (keydown.enter)="activeChip = null; applyFilter(filterValue)" />
          </div>
          <button class="s-pop-apply" (click)="activeChip = null; applyFilter(filterValue)">Apply</button>
        </div>
      </div>
    </div>
    <div class="s-filter-right">
      <button class="s-action-chip" *ngIf="filterValue" (click)="filterValue = ''; applyFilter('')"><mat-icon>close</mat-icon> Clear</button>
    </div>
  </div>

  <div class="s-table" #tableEmployees>
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="displayName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let emp">
          <div class="s-name"><span class="s-av">{{ (emp.displayName || '?')[0] }}</span> {{ emp.displayName }}</div>
        </td>
      </ng-container>
      <ng-container matColumnDef="isLoanOfficer">
        <th mat-header-cell *matHeaderCellDef>Loan officer</th>
        <td mat-cell *matCellDef="let emp">
          <span class="s-bool" [class.yes]="emp.isLoanOfficer">{{ emp.isLoanOfficer ? 'Yes' : 'No' }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="officeName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Office</th>
        <td mat-cell *matCellDef="let emp">{{ emp.officeName }}</td>
      </ng-container>
      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let emp">
          <span class="s-pill-sm" [class.active]="emp.isActive" [class.inactive]="!emp.isActive">
            {{ emp.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id]" class="s-row"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
