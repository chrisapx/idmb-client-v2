<div class="s-page">
  <div class="s-head">
    <h1>Manage Funds</h1>
    <div class="s-head-actions">
      <div #fundFormRef>
        <button mat-flat-button class="s-primary-btn" [routerLink]="['create']" *mifosxHasPermission="'CREATE_FUND'">
          <mat-icon>add</mat-icon> Add Fund
        </button>
      </div>
    </div>
  </div>

  <!-- Filter chips row -->
  <div class="s-filters">
    <div class="s-filter-left">
      <div class="s-chip-wrap" #filter>
        <button class="s-filter-chip" [class.applied]="filterValue" (click)="activeChip = activeChip === 'filter' ? null : 'filter'">
          <mat-icon>{{ filterValue ? 'check' : 'add' }}</mat-icon>
          Filter{{ filterValue ? ': ' + filterValue : '' }}
          <mat-icon class="chip-x" *ngIf="filterValue" (click)="$event.stopPropagation(); filterValue = ''; applyFilter('')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeChip === 'filter'">
          <div class="s-pop-title">Filter</div>
          <div class="s-pop-row">
            <span class="s-pop-label">contains</span>
            <input class="s-pop-input" [(ngModel)]="filterValue" placeholder="Type to filter..." (keydown.enter)="activeChip = null; applyFilter(filterValue)" />
          </div>
          <button class="s-pop-apply" (click)="activeChip = null; applyFilter(filterValue)">Apply</button>
        </div>
      </div>
    </div>
    <div class="s-filter-right">
      <button class="s-action-chip" *ngIf="filterValue" (click)="filterValue = ''; applyFilter('')"><mat-icon>close</mat-icon> Clear</button>
    </div>
  </div>

  <div #chargesTable class="s-table">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.name' | translate }}</th>
        <td mat-cell *matCellDef="let charge">{{ charge.name }}</td>
      </ng-container>

      <ng-container matColumnDef="externalId">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.External Id' | translate }}</th>
        <td mat-cell *matCellDef="let charge">
          <mifosx-external-identifier externalId="{{ charge.externalId }}"></mifosx-external-identifier>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id]" class="s-row"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>

<ng-template #templateFundFormRef let-popover="popover">
  <h2>{{ 'labels.heading.Manage Funds' | translate }}</h2>
  <p class="mw300">
    {{ 'labels.text.Used Add Fund' | translate }}:
    <a href="https://mifosforge.jira.com/wiki/spaces/docs/pages/67141736/Manage+Funds" target="_blank">{{
      'labels.inputs.Manage Funds' | translate
    }}</a>
  </p>
  <div class="layout-row align-end gap-2px responsive-column">
    <button mat-raised-button color="warn" (click)="popover.close(); configurationWizardService.closeConfigWizard()">
      Close
    </button>
    <button mat-raised-button color="primary" (click)="popover.close()">
      {{ 'labels.buttons.Add Funds' | translate }}
    </button>
    <button mat-raised-button color="primary" (click)="popover.close(); previousStep()">
      {{ 'labels.buttons.Back' | translate }}
    </button>
    <button mat-raised-button color="primary" (click)="popover.close(); nextStep()">
      {{ 'labels.buttons.Next' | translate }}
    </button>
  </div>
</ng-template>
