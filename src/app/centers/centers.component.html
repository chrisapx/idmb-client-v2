<div class="s-page">
  <div class="s-head">
    <h1>Centers</h1>
    <div class="s-head-actions">
      <button mat-stroked-button class="s-outline-btn" [routerLink]="['../', 'organization', 'bulk-import', 'Centers']" *mifosxHasPermission="'CREATE_CENTER'">
        <mat-icon>download</mat-icon> Import
      </button>
      <button mat-flat-button class="s-primary-btn" [routerLink]="['create']" *mifosxHasPermission="'CREATE_CENTER'">
        <mat-icon>add</mat-icon> Add center
      </button>
    </div>
  </div>

  <!-- Filter chips row -->
  <div class="s-filters">
    <div class="s-filter-left">

      <!-- Name filter (text input) -->
      <div class="s-chip-wrap">
        <button class="s-filter-chip" [class.applied]="appliedFilters['name']" (click)="openFilter('name')">
          <mat-icon>{{ appliedFilters['name'] ? 'check' : 'add' }}</mat-icon>
          Name{{ appliedFilters['name'] ? ': ' + appliedFilters['name'] : '' }}
          <mat-icon class="chip-x" *ngIf="appliedFilters['name']" (click)="$event.stopPropagation(); removeFilter('name')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeFilter === 'name'">
          <div class="s-pop-title">Filter by: name</div>
          <div class="s-pop-row">
            <span class="s-pop-label">contains</span>
            <input class="s-pop-input" [(ngModel)]="appliedFilters['name']" placeholder="e.g. Center A" (keydown.enter)="applyFilterValue('name', appliedFilters['name'])" />
          </div>
          <button class="s-pop-apply" (click)="applyFilterValue('name', appliedFilters['name'])">Apply</button>
        </div>
      </div>

      <!-- External ID filter (text input) -->
      <div class="s-chip-wrap">
        <button class="s-filter-chip" [class.applied]="appliedFilters['externalId']" (click)="openFilter('externalId')">
          <mat-icon>{{ appliedFilters['externalId'] ? 'check' : 'add' }}</mat-icon>
          External ID{{ appliedFilters['externalId'] ? ': ' + appliedFilters['externalId'] : '' }}
          <mat-icon class="chip-x" *ngIf="appliedFilters['externalId']" (click)="$event.stopPropagation(); removeFilter('externalId')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeFilter === 'externalId'">
          <div class="s-pop-title">Filter by: external ID</div>
          <div class="s-pop-row">
            <span class="s-pop-label">contains</span>
            <input class="s-pop-input" [(ngModel)]="appliedFilters['externalId']" placeholder="e.g. EXT-001" (keydown.enter)="applyFilterValue('externalId', appliedFilters['externalId'])" />
          </div>
          <button class="s-pop-apply" (click)="applyFilterValue('externalId', appliedFilters['externalId'])">Apply</button>
        </div>
      </div>

      <!-- Status filter (dropdown) -->
      <div class="s-chip-wrap">
        <button class="s-filter-chip" [class.applied]="appliedFilters['status']" (click)="openFilter('status')">
          <mat-icon>{{ appliedFilters['status'] ? 'check' : 'add' }}</mat-icon>
          Status{{ appliedFilters['status'] ? ': ' + appliedFilters['status'] : '' }}
          <mat-icon class="chip-x" *ngIf="appliedFilters['status']" (click)="$event.stopPropagation(); removeFilter('status')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeFilter === 'status'">
          <div class="s-pop-title">Filter by: status</div>
          <div class="s-pop-options">
            <div class="s-pop-option" *ngFor="let s of statuses" (click)="applyFilterValue('status', s)"
                 [class.selected]="appliedFilters['status'] === s">
              <mat-icon *ngIf="appliedFilters['status'] === s">check</mat-icon>
              {{ s }}
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="s-filter-right">
      <button class="s-action-chip" *ngIf="hasActiveFilters" (click)="clearAllFilters()"><mat-icon>close</mat-icon> Clear</button>
    </div>
  </div>

  <!-- Table -->
  <div class="s-table">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Center</th>
        <td mat-cell *matCellDef="let center">
          <div class="s-name"><span class="s-av">{{ (center.name || '?')[0] }}</span> {{ center.name }}</div>
        </td>
      </ng-container>
      <ng-container matColumnDef="accountNo">
        <th mat-header-cell *matHeaderCellDef>Account #</th>
        <td mat-cell *matCellDef="let center">{{ center.accountNo }}</td>
      </ng-container>
      <ng-container matColumnDef="externalId">
        <th mat-header-cell *matHeaderCellDef>External ID</th>
        <td mat-cell *matCellDef="let center">{{ center.externalId }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <span class="s-pill" [ngClass]="row.status.code | statusLookup">{{ row.status.value }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="officeName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Office</th>
        <td mat-cell *matCellDef="let center">{{ center.officeName }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id, 'general']" class="s-row"></tr>
    </table>

    <mat-paginator [length]="dataSource?.records$ | async" [pageSize]="10" [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
