<div class="s-page">
  <div class="s-head">
    <h1>Loan Products</h1>
    <button mat-flat-button class="s-primary-btn" [routerLink]="['create']" *mifosxHasPermission="'CREATE_LOANPRODUCT'" #buttonCreateLoanProduct>
      <mat-icon>add</mat-icon> Create product
    </button>
  </div>

  <div class="s-filter-row" #filter>
    <div class="s-chip-wrap">
      <button class="s-filter-chip" [class.applied]="filterValue" (click)="activeChip = activeChip === 'filter' ? null : 'filter'">
        <mat-icon>{{ filterValue ? 'check' : 'add' }}</mat-icon>
        Filter{{ filterValue ? ': ' + filterValue : '' }}
        <mat-icon class="chip-x" *ngIf="filterValue" (click)="$event.stopPropagation(); filterValue = ''; applyFilter('')">close</mat-icon>
      </button>
      <div class="s-pop" *ngIf="activeChip === 'filter'">
        <div class="s-pop-title">Filter</div>
        <div class="s-pop-row">
          <span class="s-pop-label">contains</span>
          <input class="s-pop-input" [(ngModel)]="filterValue" placeholder="Type to filter..." (keydown.enter)="activeChip = null; applyFilter(filterValue)" />
        </div>
        <button class="s-pop-apply" (click)="activeChip = null; applyFilter(filterValue)">Apply</button>
      </div>
    </div>
    <div class="s-filter-right">
      <button class="s-action-chip" *ngIf="filterValue" (click)="filterValue = ''; applyFilter('')"><mat-icon>close</mat-icon> Clear</button>
    </div>
  </div>

  <div class="s-table" #loanProductsTable>
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let lp">{{ lp.name }}</td>
      </ng-container>
      <ng-container matColumnDef="shortName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Short name</th>
        <td mat-cell *matCellDef="let lp">{{ lp.shortName }}</td>
      </ng-container>
      <ng-container matColumnDef="closeDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Expiry</th>
        <td mat-cell *matCellDef="let lp">{{ lp.closeDate | dateFormat }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let lp">
          <span class="s-pill-sm" [class.active]="lp.status === 'loanProduct.active'" [class.inactive]="lp.status !== 'loanProduct.active'">
            {{ lp.status === 'loanProduct.active' ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id]" class="s-row"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
