<div class="nt-page">
  <div class="nt-head">
    <h2>Notes</h2>
  </div>

  <!-- Add note composer -->
  <div class="nt-composer">
    <form #formRef="ngForm" [formGroup]="noteForm" (ngSubmit)="addNote()">
      <textarea
        required
        formControlName="note"
        placeholder="Write a note..."
        class="nt-textarea"
        rows="3"
      ></textarea>
      <div class="nt-composer-foot">
        <button type="submit" class="nt-btn-primary" [disabled]="!noteForm.valid">
          <mat-icon>add</mat-icon> Add note
        </button>
      </div>
    </form>
  </div>

  <!-- Notes list -->
  <div class="nt-list" *ngIf="entityNotes && entityNotes.length > 0">
    <div class="nt-card" *ngFor="let entityNote of entityNotes; let i = index">
      <div class="nt-content">{{ entityNote.note }}</div>
      <div class="nt-foot">
        <div class="nt-meta">
          <span class="nt-by">{{ entityNote.createdByUsername }}</span>
          <span class="nt-sep">·</span>
          <span class="nt-date">{{ entityNote.createdOn | dateFormat }}</span>
        </div>
        <div class="nt-actions">
          <button class="nt-icon-btn" (click)="editNote(entityNote.id, entityNote.note, i)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button class="nt-icon-btn danger" (click)="deleteNote(entityNote.id, i)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty -->
  <div class="nt-empty" *ngIf="!entityNotes || entityNotes.length === 0">
    <mat-icon>sticky_note_2</mat-icon>
    <p>No notes yet</p>
    <span>Add a note above to get started.</span>
  </div>
</div>
