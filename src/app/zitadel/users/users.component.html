<div class="s-page">
  <div class="s-head">
    <h1>Users</h1>
    <div class="s-head-actions">
      <div #buttonCreateUser class="in-block">
        <button mat-flat-button class="s-primary-btn" [routerLink]="['create']">
          <mat-icon>add</mat-icon> Add User
        </button>
      </div>
    </div>
  </div>

  <div class="s-filters">
    <div class="s-filter-left">
      <div class="s-chip-wrap">
        <button class="s-filter-chip" [class.applied]="filterValue" (click)="activeChip = activeChip === 'filter' ? null : 'filter'">
          <mat-icon>{{ filterValue ? 'check' : 'add' }}</mat-icon>
          Filter{{ filterValue ? ': ' + filterValue : '' }}
          <mat-icon class="chip-x" *ngIf="filterValue" (click)="$event.stopPropagation(); filterValue = ''; applyFilter('')">close</mat-icon>
        </button>
        <div class="s-pop" *ngIf="activeChip === 'filter'">
          <div class="s-pop-title">Filter</div>
          <div class="s-pop-row">
            <span class="s-pop-label">contains</span>
            <input class="s-pop-input" [(ngModel)]="filterValue" placeholder="Type to filter..." (keydown.enter)="activeChip = null; applyFilter(filterValue)" />
          </div>
          <button class="s-pop-apply" (click)="activeChip = null; applyFilter(filterValue)">Apply</button>
        </div>
      </div>
    </div>
    <div class="s-filter-right">
      <button class="s-action-chip" *ngIf="filterValue" (click)="filterValue = ''; applyFilter('')"><mat-icon>close</mat-icon> Clear</button>
    </div>
  </div>

  <div class="s-table">
    <table mat-table [dataSource]="dataSource" matSort #sortUsers="matSort">
      <ng-container matColumnDef="firstname">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.First Name' | translate }}</th>
        <td mat-cell *matCellDef="let user">{{ user.firstname }}</td>
      </ng-container>

      <ng-container matColumnDef="lastname">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Last Name' | translate }}</th>
        <td mat-cell *matCellDef="let user">{{ user.lastname }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Email' | translate }}</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="officeName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Office' | translate }}</th>
        <td mat-cell *matCellDef="let user">{{ user.officeName }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id]" class="s-row"></tr>
    </table>

    <mat-paginator #paginatorUsers [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
